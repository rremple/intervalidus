name: Scala CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write # for sbt-dependency-submission

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLISH_TO_PAGES: ${{ secrets.PUBLISH_TO_PAGES }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Restore cache
      uses: coursier/cache-action@v8
    - name: Set up JDK 21 & Scala
      uses: coursier/setup-action@v3
      with:
        jvm: 21
        apps: sbt
    - name: Run checks
      run: sbt "scalafmtCheckAll; versionPolicyCheck; tastyMiMaReportIssues"
    - name: Run tests
      run: sbt "coverage; test; doc; coverageReport; coverageOff"
