name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering (for site docs only)

permissions:
  contents: write
  pages: write      # Required for native GitHub Pages deployment
  id-token: write   # Required for native GitHub Pages deployment

# Prevent concurrent page deployments from clobbering each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      PUBLISH_TO_PAGES: ${{ secrets.PUBLISH_TO_PAGES }}

      # Sonatype Central Portal variables
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      # GPG Signing variables for non-interactive sbt-pgp execution
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}

    steps:
    - uses: actions/checkout@v6

    - name: Restore cache
      uses: coursier/cache-action@v8

    - name: Set up JDK 21 & Scala
      uses: coursier/setup-action@v3
      with:
        jvm: 21
        apps: sbt

    - name: Import GPG Key
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.PGP_SECRET }}
        passphrase: ${{ secrets.PGP_PASSPHRASE }}

    - name: Build and Package Site
      run: sbt "makeSite; siteCheckAll"

    - name: Setup Pages Infrastructure
      uses: actions/configure-pages@v6

    - name: Upload Site Artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: 'target/site'

    - name: Deploy Site to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

    - name: Publish Package to Sonatype Central
      # Only publish packages if current commit has a version tag
      if: startsWith(github.ref, 'refs/tags/v')
      # Compile, sign, and release directly to Maven Central
      run: |
        # Write credentials dynamically (nothing leaked in the project repo)
        mkdir -p ~/.sbt/1.0
        cat <<EOF > ~/.sbt/1.0/sonatype.sbt
        credentials += Credentials(
          "Sonatype Nexus Repository Manager",
          "central.sonatype.com",
          "$SONATYPE_USERNAME",
          "$SONATYPE_PASSWORD"
        )
        EOF

        # Automatically delete credentials when sbt completes
        trap 'rm -f ~/.sbt/1.0/sonatype.sbt' EXIT

        sbt "publishSigned; sonaRelease"